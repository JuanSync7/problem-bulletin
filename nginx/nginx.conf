worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # --- Rate limit zones ---
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=magic:10m rate=1r/s;

    # --- Gzip ---
    gzip on;
    gzip_types text/html application/json text/css application/javascript;

    # Custom 429 JSON response
    map $status $retry_after_value {
        default "";
        429     $upstream_http_retry_after;
    }

    # --- Bot detection for link-preview crawlers (REQ-368) ---
    map $http_user_agent $is_link_preview_bot {
        default                 0;
        ~*Twitterbot            1;
        ~*facebookexternalhit   1;
        ~*Slackbot              1;
        ~*LinkedInBot           1;
        ~*Discordbot            1;
        ~*TelegramBot           1;
        ~*WhatsApp              1;
    }

    server {
        listen 8000;

        # --- TLS configuration (uncomment for production) [REQ-906] ---
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/ssl/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/key.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # --- Security headers (belt-and-suspenders with app middleware) [REQ-908] ---
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Custom error page for 429
        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error": "rate_limit_exceeded", "retry_after": "$upstream_http_retry_after"}';
        }

        # --- Link-preview bot redirect to OG meta endpoint (REQ-368) ---
        location ~ ^/problems/([0-9a-fA-F-]+)$ {
            if ($is_link_preview_bot) {
                rewrite ^/problems/(.+)$ /api/problems/$1/meta break;
                proxy_pass http://api:8000;
            }

            # Non-bot requests fall through to SPA
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }

        # --- Static frontend (SPA fallback) ---
        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }

        # --- Magic link endpoint (most restrictive, matched first) ---
        location /api/auth/magic {
            limit_req zone=magic burst=2 nodelay;

            proxy_pass http://api:8000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
        }

        # --- Auth endpoints ---
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://api:8000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
        }

        # --- General API ---
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://api:8000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
        }

        # --- WebSocket ---
        location /ws {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host;
        }

        # --- Attachments (direct file serving) ---
        location /attachments/ {
            alias /data/attachments/;
        }
    }
}
